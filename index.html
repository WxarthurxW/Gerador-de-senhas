<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-widht, initial-scale=1.0">
    <title>Gerador de Senhas</title>
</head>
<body>
    <section class="conteudo">
        <div class="conteudo-titulo">
            <img src="cadeado.png" alt="cadeado fechado">
            <h1 class="titulo-prinicapl">Gerador de Senhas</h1>
            <h2 class="titulo-secundario"> Gere uma senha aleatória e segura</h2>
        </div>
        <div class="conteudo-senha">
            <label for="senha">Senha</label>
            <input name="text" type="text" id="campo-senha">
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
            <div class="parametro__senha">
                <div class="parametro-senha">
                    <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                    <div class="parametro-senha-botoes">
                        <button class="parametro-senha__botao">-</button>
                        <p class="parametro-senha__texto">12</p>
                        <button class="parametro-senha__botao">+</button>
                    </div>
                </div>
                <div class="parametro-senha">
                    <h4 class="parametro senha__titulo">Características da senha</h4>
                </div>
                <div class="parametro-senha">
                    <h4 class="parametro-senha-titulo">Força da senha</h4>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
